# Nginx 리버스 프록시 설정
# GOGS Architect API Server

# 업스트림 설정 (로드 밸런싱)
upstream gogs_architect_api {
    # PM2 클러스터 모드 프로세스들
    server 127.0.0.1:3000;
    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
    server 127.0.0.1:3003;

    # 연결 유지
    keepalive 64;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name architect.gogs.dclub.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 서버
server {
    listen 443 ssl http2;
    server_name architect.gogs.dclub.kr;

    # SSL 인증서 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/architect.gogs.dclub.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/architect.gogs.dclub.kr/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # GZIP 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;

    # 로그 파일
    access_log /var/log/nginx/architect-access.log;
    error_log /var/log/nginx/architect-error.log;

    # 클라이언트 요청 크기 제한
    client_max_body_size 20M;

    # 요청 타임아웃
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 웹 대시보드 (정적)
    location /dashboard {
        proxy_pass http://gogs_architect_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 캐싱 비활성화 (실시간 대시보드)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # API 엔드포인트
    location /api/ {
        proxy_pass http://gogs_architect_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        # Rate limiting (Nginx)
        limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
        limit_req zone=api burst=20 nodelay;
    }

    # 웹훅 엔드포인트 (높은 Rate Limit)
    location /api/v1/webhook/ {
        proxy_pass http://gogs_architect_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 웹훅은 Rate Limit 완화
        limit_req_zone $binary_remote_addr zone=webhook:10m rate=1000r/m;
        limit_req zone=webhook burst=100 nodelay;
    }

    # 헬스 체크
    location /health {
        proxy_pass http://gogs_architect_api;
        access_log off;
    }

    # 메트릭 엔드포인트 (내부 접근만)
    location /api/v1/metrics {
        proxy_pass http://gogs_architect_api;

        # 내부 IP만 허용
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # API 문서
    location / {
        proxy_pass http://gogs_architect_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 정적 콘텐츠 캐싱
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # 404 처리
    error_page 404 /404.json;
    location = /404.json {
        internal;
        default_type application/json;
        return 404 '{"error":"Not found"}';
    }

    # 500 에러 처리
    error_page 500 502 503 504 /500.json;
    location = /500.json {
        internal;
        default_type application/json;
        return 500 '{"error":"Server error"}';
    }
}
